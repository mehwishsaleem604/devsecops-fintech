
global:
  scrape_interval: 15s      
  evaluation_interval: 15s

scrape_configs:
  - job_name: "fintech-api"
    metrics_path: "/metrics"
    static_configs:
      
      - targets: ["app:5000"] 

  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  
  - job_name: "node-exporter"
    static_configs:
      - targets: ["node-exporter:9100"]