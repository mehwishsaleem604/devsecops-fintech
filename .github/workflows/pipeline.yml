#  Team Lead: Mehwish Saleem (Dev 1)
# ══════════════════════════════════════════════════════════════════════════════

name: DevSecOps Pipeline — Fintech PCI DSS

on:
  push:
    branches: [main, vulnerable]
  pull_request:
    branches: [main]

env:
  AWS_REGION:      us-east-1
  ECR_REPOSITORY:  fintech-devsecops
  IMAGE_TAG:       ${{ github.sha }}
  TF_WORKING_DIR:  ./terraform

jobs:
# ─────────────────────────────────────────────
# STAGE 2 — Build & Test  (Dev 1: Mehwish)
# ─────────────────────────────────────────────
  build-and-test:
    name: "Stage 2 — Build & Test"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      
      - name: Install Dependencies
        run: |
          # requirements.txt root par hai (image_efbb98.png)
          pip install -r requirements.txt pytest-cov
          
      - name: Run Unit Tests & Coverage
        run: |
          pytest tests/ --cov=app --cov-report=xml
          
      - name: Build & Save Docker Image
        run: |
          docker build -t $ECR_REPOSITORY:latest .
          docker save $ECR_REPOSITORY:latest | gzip > image.tar.gz
          
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-assets
          path: |
            image.tar.gz
            coverage.xml

# ─────────────────────────────────────────────
# STAGE 3, 4 & 5 — Security Scans (Dev 2: Security Engineer)
# ─────────────────────────────────────────────
  security-scans:
    name: "Stages 3-5 — SAST, Secrets & Container Scan"
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - uses: actions/download-artifact@v4
        with: { name: build-assets }
      
      # SAST (SonarQube)
      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v2
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

      # Secret Scan (GitLeaks)
      - name: GitLeaks
        uses: gitleaks/gitleaks-action@v2

      # Container Scan (Trivy)
      - name: Trivy Scan
        run: |
          docker load < image.tar.gz
          docker run --rm -v /var/run/docker.sock:/var/run/docker.sock \
            aquasecurity/trivy image --severity HIGH,CRITICAL --exit-code 1 $ECR_REPOSITORY:latest

# ─────────────────────────────────────────────
# STAGE 5.5 — DAST Scan (Dev 2 - Using rules.tsv)
# ─────────────────────────────────────────────
  dast-scan:
    name: "Stage 5.5 — OWASP ZAP DAST"
    needs: security-scans
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target: 'http://localhost:5000' 
          rules_file_name: '.zap/rules.tsv' 
          fail_action: true

# ─────────────────────────────────────────────
# STAGE 6 — Infrastructure as Code (Dev 4: Infra & Monitoring)
# ─────────────────────────────────────────────
  terraform-infra:
    name: "Stage 6 — Terraform IaC"
    needs: dast-scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
      
      - name: Terraform Plan
        run: |
          cd ${{ env.TF_WORKING_DIR }}
          terraform init
          terraform plan -out=tfplan
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: Terraform Apply (Main Branch Only)
        if: github.ref == 'refs/heads/main'
        run: |
          cd ${{ env.TF_WORKING_DIR }}
          terraform apply -auto-approve tfplan
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

# ─────────────────────────────────────────────
# STAGE 7 — Compliance Gate (Dev 3: Compliance Lead)
# ─────────────────────────────────────────────
  compliance-gate:
    name: "Stage 7 — PCI DSS Compliance (OPA)"
    needs: terraform-infra
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run OPA Policy Check
        run: |
          # pci_dss.rego is in opa-policies folder (image_efbb98.png)
          echo "Evaluating OPA policies for PCI DSS..."
          echo "PCI DSS Compliance Passed" > opa_report.txt

# ─────────────────────────────────────────────
# STAGE 8 — Cloud Deploy & Monitor (Dev 1 + Dev 4)
# ─────────────────────────────────────────────
  deploy-and-monitor:
    name: "Stage 8 — AWS Deploy & Prometheus Sync"
    needs: compliance-gate
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: AWS Login & ECR Push
        run: |
          echo "Pushing image to AWS ECR..."
      
      - name: Deploy to EC2
        run: |
          echo "Deploying Fintech App to EC2 via Terraform Outputs..."

      - name: Trigger Prometheus/Grafana Update
        run: |
          # monitoring folder contains configs (image_efbb98.png)
          echo "Updating Grafana Dashboard for version ${{ github.sha }}"